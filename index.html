<!DOCTYPE html>
<html lang="en">
<head>

<title>Tennis Things</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

<body>
<canvas id="cv"></canvas>
<script>
'use strict';
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// AUDIO
let AC;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}
function beep(f,t,d,v){try{initAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.25,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}}
function sHit(i){beep(200+i*28,'triangle',.08,.3);}
function sWall(){beep(180,'square',.04,.1);}
function sPoint(){[400,280,190].forEach((f,i)=>setTimeout(()=>beep(f,'sine',.1,.2),i*100));}
function sWin(){[262,330,392,523,659].forEach((f,i)=>setTimeout(()=>beep(f,'triangle',.18,.4),i*130));}

// DIFFICULTY
const DIFFS=[
  {name:'FACIL',   aiS:.45,padF:1.6, bm:.65},
  {name:'NORMAL',  aiS:1.0,padF:1.0, bm:1.0},
  {name:'DIFICIL', aiS:1.6,padF:.65, bm:1.4},
  {name:'EXTREMO', aiS:2.5,padF:.45, bm:1.8},
];
let diffIdx=1;

// OBJECT DRAW FUNCTIONS — drawn at (0,0), size s
function dPaper(s){
  ctx.beginPath();ctx.moveTo(-s*.38,-s*.46);ctx.lineTo(s*.25,-s*.46);ctx.lineTo(s*.46,-s*.2);ctx.lineTo(s*.46,s*.46);ctx.lineTo(-s*.38,s*.46);ctx.closePath();
  ctx.fillStyle='#eeeedd';ctx.fill();ctx.strokeStyle='#aaa99a';ctx.lineWidth=1.2;ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*.25,-s*.46);ctx.lineTo(s*.46,-s*.2);ctx.lineTo(s*.25,-s*.2);ctx.closePath();
  ctx.fillStyle='#ccccb8';ctx.fill();ctx.strokeStyle='#aaa99a';ctx.lineWidth=.8;ctx.stroke();
  ctx.strokeStyle='rgba(80,80,60,.3)';ctx.lineWidth=.7;
  for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(-s*.26,i*s*.12);ctx.lineTo(s*.18,i*s*.12);ctx.stroke();}
}
function dTennis(s){
  ctx.beginPath();ctx.arc(0,0,s,0,6.28);ctx.fillStyle='#ccff00';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-s,0);ctx.bezierCurveTo(-s*.5,-s*.6,s*.5,-s*.6,s,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-s,0);ctx.bezierCurveTo(-s*.5,s*.6,s*.5,s*.6,s,0);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.arc(-s*.3,-s*.3,s*.28,0,6.28);ctx.fill();
}
function dBaseball(s){
  ctx.beginPath();ctx.arc(0,0,s,0,6.28);ctx.fillStyle='#f5f0e8';ctx.fill();
  ctx.strokeStyle='#cc2222';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-s*.2,-s*.8);ctx.bezierCurveTo(-s*.55,-s*.3,-s*.55,s*.3,-s*.2,s*.8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*.2,-s*.8);ctx.bezierCurveTo(s*.55,-s*.3,s*.55,s*.3,s*.2,s*.8);ctx.stroke();
  ctx.lineWidth=.8;
  for(let i=-3;i<=3;i++){const y=i*s*.22;ctx.beginPath();ctx.moveTo(-s*.32,y);ctx.lineTo(-s*.18,y+s*.06);ctx.stroke();ctx.beginPath();ctx.moveTo(s*.18,y);ctx.lineTo(s*.32,y+s*.06);ctx.stroke();}
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(-s*.28,-s*.28,s*.24,0,6.28);ctx.fill();
}
function dCD(s){
  const g=ctx.createRadialGradient(0,0,s*.2,0,0,s);g.addColorStop(0,'#eee');g.addColorStop(.5,'#bbb');g.addColorStop(1,'#999');
  ctx.beginPath();ctx.arc(0,0,s,0,6.28);ctx.fillStyle=g;ctx.fill();
  const rc=['#ff000066','#ff880066','#ffff0066','#00ff0066','#0088ff66','#8800ff66'];
  rc.forEach((c,i)=>{ctx.strokeStyle=c;ctx.lineWidth=s*.14;ctx.beginPath();ctx.arc(0,0,s*.65,i*Math.PI/3,(i+1)*Math.PI/3);ctx.stroke();});
  ctx.beginPath();ctx.arc(0,0,s*.22,0,6.28);ctx.fillStyle='#222';ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.28)';ctx.beginPath();ctx.arc(-s*.3,-s*.3,s*.2,0,6.28);ctx.fill();
}
function dBowling(s){
  const g=ctx.createRadialGradient(-s*.25,-s*.25,0,0,0,s);g.addColorStop(0,'#5a4a7a');g.addColorStop(1,'#1a1028');
  ctx.beginPath();ctx.arc(0,0,s,0,6.28);ctx.fillStyle=g;ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.beginPath();ctx.ellipse(-s*.15,-s*.22,s*.1,s*.14,0,0,6.28);ctx.fill();
  ctx.beginPath();ctx.ellipse(s*.15,-s*.22,s*.1,s*.14,0,0,6.28);ctx.fill();
  ctx.beginPath();ctx.ellipse(0,s*.08,s*.1,s*.14,0,0,6.28);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.12)';ctx.beginPath();ctx.arc(-s*.3,-s*.3,s*.28,0,6.28);ctx.fill();
}
function dBubble(s){
  const g=ctx.createRadialGradient(-s*.3,-s*.3,0,0,0,s);
  g.addColorStop(0,'rgba(200,240,255,.5)');g.addColorStop(.7,'rgba(140,210,255,.1)');g.addColorStop(1,'rgba(100,180,255,.38)');
  ctx.beginPath();ctx.arc(0,0,s,0,6.28);ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='rgba(150,220,255,.6)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,s,0,6.28);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(-s*.32,-s*.32,s*.18,0,6.28);ctx.fill();
}
function dMelon(s,sx,sy){
  ctx.scale(sx||1,sy||1);
  ctx.beginPath();ctx.arc(0,0,s,0,6.28);ctx.fillStyle='#55bb33';ctx.fill();
  ctx.strokeStyle='#337722';ctx.lineWidth=s*.16;
  for(let i=-2;i<=2;i++){const x=i*s*.4;ctx.beginPath();ctx.moveTo(x,-s*.98);ctx.bezierCurveTo(x-s*.12,-s*.3,x+s*.12,s*.3,x,s*.98);ctx.stroke();}
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(-s*.3,-s*.25,s*.22,0,6.28);ctx.fill();
}
function d8Ball(s){
  ctx.beginPath();ctx.arc(0,0,s,0,6.28);ctx.fillStyle='#111';ctx.fill();
  ctx.beginPath();ctx.arc(0,0,s*.44,0,6.28);ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle='#111';ctx.lineWidth=s*.12;
  ctx.beginPath();ctx.arc(0,-s*.18,s*.14,0,6.28);ctx.stroke();
  ctx.beginPath();ctx.arc(0,s*.12,s*.17,0,6.28);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.14)';ctx.beginPath();ctx.arc(-s*.3,-s*.3,s*.22,0,6.28);ctx.fill();
}
function dStar(s){
  ctx.beginPath();
  for(let i=0;i<5;i++){const o=i*Math.PI*.4-Math.PI/2,io=o+Math.PI*.2;i===0?ctx.moveTo(Math.cos(o)*s,Math.sin(o)*s):ctx.lineTo(Math.cos(o)*s,Math.sin(o)*s);ctx.lineTo(Math.cos(io)*s*.42,Math.sin(io)*s*.42);}
  ctx.closePath();
  const g=ctx.createRadialGradient(0,0,0,0,0,s);g.addColorStop(0,'#ffffa0');g.addColorStop(1,'#ff9900');
  ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#cc6600';ctx.lineWidth=1;ctx.stroke();
}
function dDiamond(s){
  ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.6,-s*.15);ctx.lineTo(s*.5,s*.7);ctx.lineTo(0,s*.9);ctx.lineTo(-s*.5,s*.7);ctx.lineTo(-s*.6,-s*.15);ctx.closePath();
  ctx.fillStyle='#44aaff';ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.42)';ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.6,-s*.15);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(-s*.6,-s*.15);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(0,40,120,.28)';ctx.beginPath();ctx.moveTo(-s*.5,s*.7);ctx.lineTo(s*.5,s*.7);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,120,255,.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.6,-s*.15);ctx.lineTo(s*.5,s*.7);ctx.lineTo(0,s*.9);ctx.lineTo(-s*.5,s*.7);ctx.lineTo(-s*.6,-s*.15);ctx.closePath();ctx.stroke();
}
function dSoccer(s){
  ctx.beginPath();ctx.arc(0,0,s,0,6.28);ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();for(let i=0;i<6;i++){const o=i*Math.PI/3;i===0?ctx.moveTo(Math.cos(o)*s*.34,Math.sin(o)*s*.34):ctx.lineTo(Math.cos(o)*s*.34,Math.sin(o)*s*.34);}ctx.closePath();ctx.fill();
  for(let j=0;j<5;j++){const b=j*Math.PI*.4-Math.PI/2;const cx=Math.cos(b)*s*.62,cy=Math.sin(b)*s*.62;ctx.beginPath();for(let i=0;i<5;i++){const o=i*Math.PI*.4+b+Math.PI;i===0?ctx.moveTo(cx+Math.cos(o)*s*.22,cy+Math.sin(o)*s*.22):ctx.lineTo(cx+Math.cos(o)*s*.22,cy+Math.sin(o)*s*.22);}ctx.closePath();ctx.fill();}
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(-s*.28,-s*.28,s*.24,0,6.28);ctx.fill();
}
function dCoin(s){
  const g=ctx.createRadialGradient(-s*.2,-s*.2,0,0,0,s);g.addColorStop(0,'#fff066');g.addColorStop(.5,'#ffd700');g.addColorStop(1,'#cc9900');
  ctx.beginPath();ctx.arc(0,0,s,0,6.28);ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='#aa7700';ctx.lineWidth=s*.12;ctx.beginPath();ctx.arc(0,0,s*.88,0,6.28);ctx.stroke();
  ctx.strokeStyle='#cc8800';ctx.lineWidth=s*.08;
  for(let i=0;i<4;i++){const o=i*Math.PI/4;ctx.beginPath();ctx.moveTo(Math.cos(o)*s*.45,Math.sin(o)*s*.45);ctx.lineTo(Math.cos(o+Math.PI)*s*.45,Math.sin(o+Math.PI)*s*.45);ctx.stroke();}
}
function dSnowflake(s){
  ctx.strokeStyle='#cceeff';ctx.lineWidth=s*.12;
  for(let i=0;i<6;i++){const o=i*Math.PI/3;const ex=Math.cos(o)*s,ey=Math.sin(o)*s;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(ex,ey);ctx.stroke();const bx=Math.cos(o)*s*.55,by=Math.sin(o)*s*.55,bo=o+Math.PI/2;ctx.lineWidth=s*.07;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(bo)*s*.25,by+Math.sin(bo)*s*.25);ctx.stroke();ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx-Math.cos(bo)*s*.25,by-Math.sin(bo)*s*.25);ctx.stroke();ctx.lineWidth=s*.12;}
  ctx.fillStyle='#aaddff';ctx.beginPath();ctx.arc(0,0,s*.15,0,6.28);ctx.fill();
}
function dLeaf(s){
  ctx.fillStyle='#55cc22';ctx.beginPath();ctx.moveTo(0,-s*.9);ctx.bezierCurveTo(s*.8,-s*.5,s*.9,s*.3,0,s*.9);ctx.bezierCurveTo(-s*.9,s*.3,-s*.8,-s*.5,0,-s*.9);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,80,0,.45)';ctx.lineWidth=s*.08;ctx.beginPath();ctx.moveTo(0,-s*.8);ctx.lineTo(0,s*.8);ctx.stroke();
  for(let i=-3;i<=3;i++){if(i===0)continue;const y=i*s*.22,l=s*.35-Math.abs(i)*s*.04;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(l,y-s*.08);ctx.stroke();ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(-l,y-s*.08);ctx.stroke();}
  ctx.fillStyle='rgba(200,255,150,.22)';ctx.beginPath();ctx.arc(-s*.22,-s*.28,s*.24,0,6.28);ctx.fill();
}
function dHeart(s){
  const h=s*.85;
  ctx.fillStyle='#ff2244';ctx.beginPath();ctx.moveTo(0,h*.3);ctx.bezierCurveTo(-h*.1,0,-h*.6,-h*.5,-h*.55,-h*.7);ctx.bezierCurveTo(-h*.45,-h,-h*.1,-h*.9,0,-h*.6);ctx.bezierCurveTo(h*.1,-h*.9,h*.45,-h,h*.55,-h*.7);ctx.bezierCurveTo(h*.6,-h*.5,h*.1,0,0,h*.3);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,150,170,.4)';ctx.beginPath();ctx.ellipse(-h*.2,-h*.65,h*.15,h*.1,-Math.PI*.3,0,6.28);ctx.fill();
}
function dCrystal(s){
  ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.7,-s*.4);ctx.lineTo(s*.7,s*.4);ctx.lineTo(0,s);ctx.lineTo(-s*.7,s*.4);ctx.lineTo(-s*.7,-s*.4);ctx.closePath();ctx.fillStyle='#88ccff';ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.7,-s*.4);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(0,60,180,.32)';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(s*.7,s*.4);ctx.lineTo(0,s);ctx.lineTo(-s*.7,s*.4);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,120,255,.65)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.7,-s*.4);ctx.lineTo(s*.7,s*.4);ctx.lineTo(0,s);ctx.lineTo(-s*.7,s*.4);ctx.lineTo(-s*.7,-s*.4);ctx.closePath();ctx.stroke();
}
function dFireball(s){
  ctx.shadowBlur=20;ctx.shadowColor='#ff6600';
  const g=ctx.createRadialGradient(0,s*.2,0,0,0,s);g.addColorStop(0,'#ffff88');g.addColorStop(.3,'#ff8800');g.addColorStop(.7,'#ff3300');g.addColorStop(1,'#aa0000');
  ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,-s);ctx.bezierCurveTo(s*.4,-s*.7,s*.8,-s*.3,s*.6,s*.2);ctx.bezierCurveTo(s*.5,s*.6,s*.2,s*.8,0,s*.9);ctx.bezierCurveTo(-s*.2,s*.8,-s*.5,s*.6,-s*.6,s*.2);ctx.bezierCurveTo(-s*.8,-s*.3,-s*.4,-s*.7,0,-s);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,200,.32)';ctx.beginPath();ctx.arc(0,s*.1,s*.32,0,6.28);ctx.fill();
}
function dGear(s){
  const teeth=8,ri=s*.56;
  ctx.fillStyle='#7a8898';ctx.beginPath();
  for(let i=0;i<teeth*2;i++){const o=i*Math.PI/teeth-Math.PI/teeth*.5,r=i%2===0?s:ri;i===0?ctx.moveTo(Math.cos(o)*r,Math.sin(o)*r):ctx.lineTo(Math.cos(o)*r,Math.sin(o)*r);}
  ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.arc(0,0,s*.44,0,6.28);ctx.fillStyle='#5a6878';ctx.fill();
  ctx.beginPath();ctx.arc(0,0,s*.2,0,6.28);ctx.fillStyle='#2a3040';ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.14)';ctx.beginPath();ctx.arc(-s*.24,-s*.24,s*.24,0,6.28);ctx.fill();
}
function dMoon(s){
  ctx.fillStyle='#fff8c8';ctx.shadowBlur=14;ctx.shadowColor='#fff8a0';
  ctx.beginPath();ctx.arc(0,0,s,0,6.28,false);ctx.arc(s*.3,-s*.08,s*.78,0,6.28,true);ctx.fill('evenodd');
  ctx.shadowBlur=0;
}
function dLightning(s){
  ctx.shadowBlur=18;ctx.shadowColor='#ffff00';
  const g=ctx.createLinearGradient(0,-s,0,s);g.addColorStop(0,'#ffffff');g.addColorStop(.5,'#ffff00');g.addColorStop(1,'#ffaa00');
  ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(s*.2,-s);ctx.lineTo(-s*.12,-s*.05);ctx.lineTo(s*.28,-s*.05);ctx.lineTo(-s*.25,s);ctx.lineTo(s*.05,s*.08);ctx.lineTo(-s*.12,s*.08);ctx.lineTo(s*.2,-s);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
}
function dRocket(s){
  ctx.fillStyle='#ddeeff';
  ctx.beginPath();ctx.moveTo(0,-s);ctx.bezierCurveTo(s*.5,-s*.5,s*.4,s*.2,s*.35,s*.5);ctx.lineTo(-s*.35,s*.5);ctx.bezierCurveTo(-s*.4,s*.2,-s*.5,-s*.5,0,-s);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ff4400';ctx.beginPath();ctx.moveTo(-s*.35,s*.5);ctx.lineTo(0,s*.9);ctx.lineTo(s*.35,s*.5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#4488ff';ctx.beginPath();ctx.arc(0,-s*.18,s*.22,0,6.28);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.arc(-s*.08,-s*.25,s*.12,0,6.28);ctx.fill();
}
function dCrown(s){
  ctx.fillStyle='#ffd700';ctx.beginPath();ctx.moveTo(-s*.7,s*.3);ctx.lineTo(-s*.7,-s*.1);ctx.lineTo(-s*.35,s*.2);ctx.lineTo(0,-s*.5);ctx.lineTo(s*.35,s*.2);ctx.lineTo(s*.7,-s*.1);ctx.lineTo(s*.7,s*.3);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#cc8800';ctx.lineWidth=1.5;ctx.stroke();
  ['#ff4444','#4444ff','#44ff44'].forEach((c,i)=>{ctx.fillStyle=c;ctx.beginPath();ctx.arc(-s*.35+i*s*.35,-s*.05,s*.1,0,6.28);ctx.fill();});
}
function dShuriken(s){
  ctx.fillStyle='#8899aa';
  for(let i=0;i<4;i++){ctx.save();ctx.rotate(i*Math.PI/2);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-s*.4,-s*.4);ctx.lineTo(0,-s);ctx.lineTo(s*.4,-s*.4);ctx.closePath();ctx.fill();ctx.restore();}
  ctx.beginPath();ctx.arc(0,0,s*.22,0,6.28);ctx.fillStyle='#445566';ctx.fill();
}

const OBJ_DRAW=[dPaper,dTennis,dBaseball,dCD,dBowling,dBubble,dMelon,d8Ball,dStar,dDiamond,dSoccer,dCoin,dSnowflake,dLeaf,dHeart,dCrystal,dFireball,dGear,dMoon,dLightning,dRocket,dCrown,dShuriken];

// OBJECTS — grav tuned for VERTICAL play (main axis)
// flutter: random drift each frame, wobble: sinusoidal drift, drag: velocity decay
const OBJECTS=[
  {name:'Paper Ball',  r:15,grav:-.010,spd:5.0,acc:.10,maxS:9,  rot:true, flutter:.18,drag:.994,hitW:1},
  {name:'Tennis Ball', r:13,grav:.008, spd:6.5,acc:.30,maxS:13, rot:true,               hitW:2},
  {name:'Baseball',    r:13,grav:.030, spd:8.0,acc:.50,maxS:16, rot:true,               hitW:3},
  {name:'CD Disc',     r:12,grav:.000, spd:10.,acc:.70,maxS:20, wacky:true,rot:true,   hitW:2},
  {name:'Bowling Ball',r:19,grav:.065, spd:5.5,acc:.40,maxS:14, rot:false,drag:.997,   hitW:5},
  {name:'Bubble',      r:17,grav:-.028,spd:4.0,acc:.12,maxS:8,  rot:false,flutter:.06,drag:.995,hitW:1},

  {name:'8-Ball',      r:14,grav:.032, spd:7.5,acc:.55,maxS:15, rot:true,               hitW:3},
  {name:'Star',        r:13,grav:.012, spd:7.0,acc:.40,maxS:14, rot:true,               hitW:2},
  {name:'Diamond',     r:12,grav:-.018,spd:8.5,acc:.60,maxS:17, rot:true,               hitW:2},
  {name:'Soccer Ball', r:15,grav:.022, spd:7.0,acc:.45,maxS:14, rot:true,               hitW:3},
  {name:'Gold Coin',   r:11,grav:.025, spd:9.0,acc:.65,maxS:17, rot:true,               hitW:2},
  {name:'Snowflake',   r:13,grav:-.020,spd:4.5,acc:.10,maxS:9,  rot:true, flutter:.08, hitW:1},
  {name:'Leaf',        r:12,grav:-.008,spd:4.5,acc:.08,maxS:8,  rot:true, flutter:.12,drag:.996,hitW:1},
  {name:'Heart',       r:13,grav:.010, spd:6.0,acc:.25,maxS:12, rot:true,               hitW:2},
  {name:'Crystal',     r:12,grav:-.022,spd:8.0,acc:.50,maxS:16, rot:true,               hitW:2},

// BG
let bgP=[],bgFr=0;
function rnd(n){return Math.random()*n;}
function initBg(){
  bgP=[];bgFr=0;
  const tp=WORLDS[wIdx].tp;
  for(let i=0;i<(tp==='city'?22:72);i++){
    const vbase=tp==='rain'?2.8:tp==='snow'?.45:tp==='fire'?-1.5:0;
    bgP.push({x:rnd(W),y:rnd(H),vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4+vbase,r:1+rnd(3),ph:rnd(6.28),sp:.012+rnd(.025),bw:18+i*3,bh:55+i*12});
  }
}
function updBg(){
  bgFr++;
  bgP.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.ph+=p.sp;
    const tp=WORLDS[wIdx].tp;
    if(['rain','snow','fire','petals','leaves'].includes(tp)){if(p.y>H+10)p.y=-10;if(p.y<-10)p.y=H+10;}
    else{if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;}
  });
}
function drawBg(){
  const w=WORLDS[wIdx];
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,w.g1);g.addColorStop(1,w.g2);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  switch(w.tp){
    case 'court':   bgCourt(w.tc);break;
    case 'stars':   bgStars(w.tc);break;
    case 'grid':    bgGrid(w.tc);break;
    case 'lines':   bgLines(w.tc);break;
    case 'dots':    bgDots(w.tc);break;
    case 'bubbles': bgBubbles(w.tc);break;
    case 'snow':    bgSnow();break;
    case 'fire':    bgFire();break;
    case 'rain':    bgRain();break;
    case 'leaves':  bgLeaves(w.tc);break;
    case 'city':    bgCity(w.tc);break;
    case 'disco':   bgDisco();break;
    case 'petals':  bgPetals(w.tc);break;
    case 'clouds':  bgClouds();break;
    case 'spiral':  bgSpiral(w.tc);break;
    case 'lanes':   bgLanes(w.tc);break;
  }
  // center divider (net line)
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=2;ctx.setLineDash([12,10]);
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);
}
function bgCourt(tc){ctx.strokeStyle=tc;ctx.lineWidth=2;ctx.strokeRect(16,16,W-32,H-32);ctx.setLineDash([10,8]);ctx.beginPath();ctx.moveTo(16,H/2);ctx.lineTo(W-16,H/2);ctx.stroke();ctx.setLineDash([]);ctx.beginPath();ctx.arc(W/2,H/2,36,0,6.28);ctx.stroke();}
function bgStars(tc){const iw=tc==='#ffffff';bgP.forEach(p=>{const a=.2+.8*Math.abs(Math.sin(p.ph));ctx.fillStyle=iw?`rgba(255,255,255,${a.toFixed(2)})`:`rgba(255,100,200,${a.toFixed(2)})`;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.2,p.r*.5),0,6.28);ctx.fill();});}
function bgGrid(tc){ctx.strokeStyle=tc;ctx.lineWidth=1;const gs=Math.min(W,H)/9;for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}}
function bgLines(tc){ctx.strokeStyle=tc;ctx.lineWidth=1.5;for(let x=W/5;x<W;x+=W/5){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}ctx.lineWidth=.7;for(let x=W/10;x<W;x+=W/10){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}}
function bgDots(tc){bgP.forEach(p=>{ctx.globalAlpha=.3+.4*Math.abs(Math.sin(p.ph));ctx.fillStyle=tc;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.5,p.r),0,6.28);ctx.fill();});ctx.globalAlpha=1;}
function bgBubbles(tc){bgP.forEach(p=>{ctx.strokeStyle=tc;ctx.lineWidth=1;ctx.globalAlpha=.18+.22*Math.abs(Math.sin(p.ph));ctx.beginPath();ctx.arc(p.x,p.y,Math.max(1,p.r*2),0,6.28);ctx.stroke();});ctx.globalAlpha=1;}
function bgSnow(){bgP.forEach(p=>{ctx.fillStyle='rgba(255,255,255,.6)';ctx.globalAlpha=.4+.5*Math.abs(Math.sin(p.ph));ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.4,p.r*.55),0,6.28);ctx.fill();});ctx.globalAlpha=1;ctx.fillStyle='#d8f0ff';ctx.fillRect(0,H*.92,W,H*.08);}
function bgFire(){bgP.forEach(p=>{const a=Math.max(0,.5+.5*(1-p.y/H));const gb=Math.min(255,(p.r*35)|0);ctx.fillStyle=`rgba(255,${gb},0,${a.toFixed(2)})`;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.5,p.r),0,6.28);ctx.fill();});const lg=ctx.createLinearGradient(0,H*.82,0,H);lg.addColorStop(0,'transparent');lg.addColorStop(1,'rgba(255,60,0,.38)');ctx.fillStyle=lg;ctx.fillRect(0,H*.82,W,H*.18);}
function bgRain(){ctx.strokeStyle='rgba(170,190,220,.38)';ctx.lineWidth=1;bgP.forEach(p=>{ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-2,p.y-11);ctx.stroke();});}
function bgLeaves(tc){bgP.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.ph);ctx.globalAlpha=.35+.3*Math.abs(Math.sin(p.ph));ctx.fillStyle=tc;ctx.beginPath();ctx.ellipse(0,0,p.r*1.8,p.r*.8,0,0,6.28);ctx.fill();ctx.restore();});ctx.globalAlpha=1;}
function bgCity(tc){const isN=tc==='#ff00ff';bgP.slice(0,22).forEach((p,i)=>{const bh=p.bh;ctx.fillStyle='#070720';ctx.fillRect(p.x-p.bw/2,H-bh,p.bw,bh);for(let wy=H-bh+8;wy<H-10;wy+=14){for(let wx=p.x-p.bw/2+4;wx<p.x+p.bw/2-4;wx+=10){if(((wx*7+wy*3+bgFr/60|0)%5)!==0){ctx.fillStyle=isN?'rgba(255,0,255,.45)':'rgba(255,220,100,.42)';ctx.fillRect(wx,wy,5,8);}}}});ctx.fillStyle='#0a0a22';ctx.fillRect(0,H*.93,W,H*.07);}
function bgDisco(){const s=Math.min(W,H)/7;for(let x=0;x<W;x+=s){for(let y=0;y<H;y+=s){const h=(x*2+y*3+bgFr*3)%360,a=.06+.06*Math.sin((x+y+bgFr)*.1);ctx.fillStyle=`hsla(${h},100%,50%,${a.toFixed(2)})`;ctx.fillRect(x,y,s-.5,s-.5);}}}
function bgPetals(tc){bgP.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.ph);ctx.globalAlpha=.45;ctx.fillStyle=tc;ctx.beginPath();ctx.ellipse(0,0,p.r*1.5,p.r*.7,0,0,6.28);ctx.fill();ctx.restore();});ctx.globalAlpha=1;}
function bgClouds(){bgP.slice(0,16).forEach(p=>{[0,14,-14,8,-8].forEach((dx,i)=>{ctx.fillStyle='rgba(255,255,255,.13)';ctx.beginPath();ctx.arc(p.x+dx,p.y+(i<3?-7:0),11-i*1.2,0,6.28);ctx.fill();});});}
function bgSpiral(tc){for(let a=0;a<Math.PI*10;a+=.12){const r=a*11;const x=W/2+Math.cos(a+bgFr*.02)*r,y=H/2+Math.sin(a+bgFr*.02)*r;if(x<0||x>W||y<0||y>H)continue;ctx.globalAlpha=Math.max(0,.35-r/Math.min(W,H));ctx.fillStyle=tc;ctx.beginPath();ctx.arc(x,y,1.5,0,6.28);ctx.fill();}ctx.globalAlpha=1;}
function bgLanes(tc){const lw=W/5;ctx.strokeStyle=tc;ctx.lineWidth=2;for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(i*lw,0);ctx.lineTo(i*lw,H);ctx.stroke();}ctx.strokeStyle='rgba(255,100,0,.22)';ctx.lineWidth=3;ctx.setLineDash([20,14]);ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);}

// CONSTANTS — vertical pong
const WIN=5;
const PT=12;   // paddle thickness (height)
const PY_OFF=62; // paddle center Y from screen edge

// STATE
const S={MENU:0,MODE:1,PLAY:2,POINT:3,WWIN:4,LOSE:5,VICTORY:6,PAUSE:7,ERR:8};
let state=S.MENU,mode='1p',wIdx=0,fr=0;
let ptDelay=0,ptDir=1,scoreLocked=false;
let pausedState=S.PLAY,lastErr='',lastTouch=0;
// p.x = center X, p.w = paddle width, p.y = fixed vertical position
let p1={x:0,y:0,w:0,score:0,sets:0}; // bottom (player)
let p2={x:0,y:0,w:0,score:0,sets:0}; // top (AI/P2)
let ball={x:0,y:0,vx:0,vy:0,ang:0};
let trail=[],ptcls=[];

// paddle width shrinks each world, scaled by difficulty
function padW(){return Math.max(W*.055, W*.28*Math.pow(.91,wIdx)*DIFFS[diffIdx].padF);}

function initPos(){
  p1.w=p2.w=padW();
  p1.y=H-PY_OFF; p2.y=PY_OFF;
  p1.x=p2.x=W/2;
}

function resetBall(dir){
  ball.x=W/2;ball.y=H/2;ball.ang=0;
  const obj=OBJECTS[WORLDS[wIdx].obj],bm=DIFFS[diffIdx].bm;
  const ang=(Math.random()-.5)*.5;
  const d=dir!==undefined?dir:(Math.random()>.5?1:-1);
  // d=1 → going DOWN (vy positive), d=-1 → going UP
  ball.vy=d*obj.spd*bm*Math.cos(ang);
  ball.vx=obj.spd*bm*Math.sin(ang);
  trail=[];scoreLocked=false;
}

// DRAW OBJECT
function drawObj(x,y,a){
  const wd=WORLDS[wIdx],obj=OBJECTS[wd.obj],br=obj.r;
  const drawIdx=wd.obj<OBJ_DRAW.length?wd.obj:0;
  // trail
  for(let i=1;i<trail.length;i++){
    const f=i/trail.length,tr=br*f*.55;if(tr<.25)continue;
    ctx.globalAlpha=f*.18;ctx.fillStyle=wd.c1;
    ctx.beginPath();ctx.arc(trail[i].x,trail[i].y,tr,0,6.28);ctx.fill();
  }
  ctx.globalAlpha=1;
  // speed squish — stretch in direction of motion
  const spd=Math.hypot(ball.vx,ball.vy);
  const squish=Math.min(.3,(spd-6)*.03);
  const motAng=Math.atan2(ball.vy,ball.vx);
  ctx.shadowBlur=12;ctx.shadowColor='rgba(255,255,255,.25)';
  ctx.save();ctx.translate(x,y);
  if(squish>0){ctx.rotate(motAng);ctx.scale(1+squish*.6,1-squish*.4);ctx.rotate(-motAng);}
  ctx.rotate(a);
  OBJ_DRAW[drawIdx](br);
  ctx.restore();ctx.shadowBlur=0;
}

// PARTICLES
function spawnHit(x,y,col,w){
  const cnt=6+w*4;
  for(let i=0;i<cnt;i++){const a=rnd(6.28),s=1+rnd(3+w);ptcls.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:1.5+rnd(2+w*.5),life:1,col});}
}
function spawnBurst(){for(let i=0;i<60;i++){const a=rnd(6.28),s=2+rnd(7);ptcls.push({x:W/2,y:H/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:3+rnd(5),life:1,col:'hsl('+((rnd(360)|0))+',100%,65%)'});}}
function updPtcls(){ptcls=ptcls.filter(p=>p.life>0);ptcls.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.88;p.vy*=.88;p.life-=.03;});}
function drawPtcls(){ptcls.forEach(p=>{const r=p.r*p.life;if(r<.1)return;ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,r,0,6.28);ctx.fill();});ctx.globalAlpha=1;}

// PADDLE — horizontal bar
function drawPad(p,col){
  ctx.shadowBlur=18;ctx.shadowColor=col;
  ctx.fillStyle=col;ctx.fillRect(p.x-p.w/2,p.y-PT/2,p.w,PT);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.18)';
  if(p.w>20)ctx.fillRect(p.x-p.w/2+3,p.y-PT/2+2,p.w-6,PT-4);
}

// HUD — portrait layout: scores near top/bottom edges
function drawHUD(){
  const wd=WORLDS[wIdx];
  ctx.textAlign='center';ctx.textBaseline='middle';
  // P2 score at top
  ctx.font='bold 26px monospace';ctx.fillStyle=wd.c2;ctx.shadowBlur=8;ctx.shadowColor=wd.c2;
  ctx.fillText(p2.score,W/2,22);ctx.shadowBlur=0;
  // P2 dots
  for(let i=0;i<WIN;i++){ctx.fillStyle=i<p2.score?wd.c2:'rgba(255,255,255,.12)';ctx.beginPath();ctx.arc(W/2-(WIN-1)*7+i*14,38,3.5,0,6.28);ctx.fill();}
  // P1 score at bottom
  ctx.font='bold 26px monospace';ctx.fillStyle=wd.c1;ctx.shadowBlur=8;ctx.shadowColor=wd.c1;
  ctx.fillText(p1.score,W/2,H-22);ctx.shadowBlur=0;
  // P1 dots
  for(let i=0;i<WIN;i++){ctx.fillStyle=i<p1.score?wd.c1:'rgba(255,255,255,.12)';ctx.beginPath();ctx.arc(W/2-(WIN-1)*7+i*14,H-38,3.5,0,6.28);ctx.fill();}
  // Sets center
  ctx.font='bold 13px monospace';ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.fillText(p1.sets+' - '+p2.sets,W/2,H/2);
  // World info
  ctx.font='8px monospace';ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.fillText((wIdx+1)+'/40  '+wd.name+'  '+OBJECTS[wd.obj].name,W/2,H/2+14);
  ctx.textBaseline='alphabetic';
}

// PAUSE BTN
function drawPauseBtn(){
  ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(W-46,6,40,30);
  ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=1;ctx.strokeRect(W-46,6,40,30);
  ctx.fillStyle='rgba(255,255,255,.55)';
  ctx.fillRect(W-38,12,5,18);ctx.fillRect(W-28,12,5,18);
}

// PHYSICS — VERTICAL PONG
function updateBall(){
  const prevX=ball.x,prevY=ball.y;
  const wd=WORLDS[wIdx],obj=OBJECTS[wd.obj],br=obj.r,bm=DIFFS[diffIdx].bm;

  trail.push({x:ball.x,y:ball.y});if(trail.length>16)trail.shift();

  // Gravity on main (vertical) axis
  ball.vy+=obj.grav;

  // Special physics
  if(obj.flutter)ball.vx+=(Math.random()-.5)*obj.flutter;
  if(obj.wobble) ball.vx+=Math.sin(fr*.12)*obj.wobble;
  if(obj.drag){ball.vx*=obj.drag;ball.vy*=obj.drag;}

  // Terminal velocity
  const term=obj.maxS*bm;
  if(ball.vy>term)ball.vy=term;
  if(ball.vy<-term)ball.vy=-term;

  ball.x+=ball.vx;ball.y+=ball.vy;

  // Rotation
  if(obj.rot)ball.ang+=Math.hypot(ball.vx,ball.vy)*.05;

  // Left/right wall bounce
  if(ball.x<br){ball.x=br;ball.vx=Math.abs(ball.vx);sWall();}
  if(ball.x>W-br){ball.x=W-br;ball.vx=-Math.abs(ball.vx);sWall();}

  // P1 (bottom) sweep — ball moving DOWN, crosses top face of P1 paddle
  if(ball.vy>0 && prevY+br<=p1.y-PT/2 && ball.y+br>=p1.y-PT/2){
    if(ball.x>=p1.x-p1.w/2 && ball.x<=p1.x+p1.w/2){
      bounce(p1,-1);spawnHit(ball.x,p1.y-PT/2,wd.c1,obj.hitW||2);sHit(wIdx%10);
    }
  }
  // P2 (top) sweep — ball moving UP, crosses bottom face of P2 paddle
  if(ball.vy<0 && prevY-br>=p2.y+PT/2 && ball.y-br<=p2.y+PT/2){
    if(ball.x>=p2.x-p2.w/2 && ball.x<=p2.x+p2.w/2){
      bounce(p2,1);spawnHit(ball.x,p2.y+PT/2,wd.c2,obj.hitW||2);sHit(wIdx%10);
    }
  }

  // Scoring
  if(ball.y>H+br+10){p2.score++;sPoint();scored(false);}
  else if(ball.y<-br-10){p1.score++;sPoint();scored(true);}
}

function bounce(pad,dirY){
  // dirY: -1 = reflect UP (P1 hit), +1 = reflect DOWN (P2 hit)
  const wd=WORLDS[wIdx],obj=OBJECTS[wd.obj],br=obj.r,bm=DIFFS[diffIdx].bm;
  const hitFrac=Math.max(-1,Math.min(1,(ball.x-pad.x)/(pad.w/2)));
  const spd=Math.min(Math.hypot(ball.vx,ball.vy)+obj.acc,obj.maxS*bm);
  const maxAng=Math.PI*5/12;
  const noise=obj.wacky?(Math.random()-.5)*.9:0;
  const ang=hitFrac*maxAng+noise;
  ball.vy=dirY*Math.cos(ang)*spd;  // main vertical
  ball.vx=Math.sin(ang)*spd;        // horizontal spin
  ball.y=dirY<0?pad.y-PT/2-br-1:pad.y+PT/2+br+1;
}

function scored(p1won){
  if(scoreLocked)return;scoreLocked=true;
  if(p1.score>=WIN||p2.score>=WIN){
    if(p1.score>=WIN){p1.sets++;sWin();spawnBurst();state=wIdx>=WORLDS.length-1?S.VICTORY:S.WWIN;}
    else{p2.sets++;if(mode==='1p'){state=S.LOSE;}else{sWin();state=wIdx>=WORLDS.length-1?S.VICTORY:S.WWIN;}}
  } else {
    ball.x=W/2;ball.y=H/2;ball.vx=0;ball.vy=0;trail=[];
    ptDir=p1won?-1:1; ptDelay=54;state=S.POINT;
  }
}

// AI — moves P2 left-right to track ball
function updateAI(){
  if(mode==='2p')return;
  const spd=(2.2+wIdx*.3)*DIFFS[diffIdx].aiS;
  const err=(Math.random()-.5)*Math.max(4,26-wIdx*1.8-diffIdx*5);
  const tgt=ball.x+err;
  const diff=tgt-p2.x;
  if(Math.abs(diff)>2)p2.x+=Math.sign(diff)*Math.min(spd,Math.abs(diff));
  p2.x=Math.max(p2.w/2,Math.min(W-p2.w/2,p2.x));
}

  const wi=(fr/90|0)%WORLDS.length,wd=WORLDS[wi];
  ctx.save();ctx.translate(W/2,H*.25);ctx.shadowBlur=22;ctx.shadowColor=wd.c1;
  OBJ_DRAW[wd.obj<OBJ_DRAW.length?wd.obj:0](Math.min(W*.1,36));
  ctx.restore();ctx.shadowBlur=0;
  const ts=Math.min(W*.12,48);

  ctx.font='9px monospace';ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillText('40 MUNDOS  23 OBJETOS  4 DIFICULTADES',W/2,H*.76);

}

function drawPauseScreen(){
  drawBg();drawPtcls();drawObj(ball.x,ball.y,ball.ang);
  drawPad(p1,WORLDS[wIdx].c1);drawPad(p2,WORLDS[wIdx].c2);drawHUD();

  ctx.fillStyle='rgba(68,136,255,.2)';ctx.fillRect(W/2-85,H*.47-26,170,54);
  ctx.strokeStyle='#4488ff';ctx.lineWidth=2;ctx.strokeRect(W/2-85,H*.47-26,170,54);
  ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.fillText('CONTINUAR',W/2,H*.47);
  ctx.textBaseline='alphabetic';

  drawBg();drawPtcls();ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';

  ctx.font='bold 22px monospace';ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillText('Sets: '+p1.sets+' - '+p2.sets,W/2,H*.38);

    const nw=WORLDS[wIdx+1],no=OBJECTS[nw.obj];

    const pw=padW();
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(W/2-pw/2,H*.62,pw,PT);

    ctx.font='9px monospace';ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillText('tu raqueta: '+Math.round(pw)+'px',W/2,H*.62+PT+14);
    ctx.save();ctx.translate(W/2,H*.74);ctx.shadowBlur=12;ctx.shadowColor=nw.c1;

  ctx.globalAlpha=.5+.5*Math.sin(fr*.06);ctx.font='bold 14px monospace';ctx.fillStyle='#fff';ctx.fillText('TAP PARA CONTINUAR',W/2,H*.88);ctx.globalAlpha=1;ctx.textBaseline='alphabetic';
}

function drawLose(){
  drawBg();ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#ff4455';ctx.beginPath();ctx.arc(W/2,H*.22,24,0,6.28);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.fillText('X',W/2,H*.22);
  ctx.font='bold 28px monospace';ctx.fillStyle='#ff4455';ctx.shadowBlur=12;ctx.shadowColor='#ff4455';ctx.fillText('GAME OVER',W/2,H*.35);ctx.shadowBlur=0;
  ctx.font='13px monospace';ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.fillText('Mundo: '+WORLDS[wIdx].name,W/2,H*.44);
  ctx.fillText('Sets: '+p1.sets+' - '+p2.sets,W/2,H*.52);
  const wd=WORLDS[wIdx],obj=OBJECTS[wd.obj];
  ctx.save();ctx.translate(W/2,H*.64);ctx.shadowBlur=10;ctx.shadowColor=wd.c1;
  OBJ_DRAW[wd.obj<OBJ_DRAW.length?wd.obj:0](obj.r);
  ctx.restore();ctx.shadowBlur=0;
  ctx.globalAlpha=.5+.5*Math.sin(fr*.06);ctx.font='bold 14px monospace';ctx.fillStyle='#fff';ctx.fillText('TAP PARA REINICIAR',W/2,H*.80);ctx.globalAlpha=1;ctx.textBaseline='alphabetic';
}

function drawVictory(){
  ctx.fillStyle='rgba(0,0,30,.92)';ctx.fillRect(0,0,W,H);drawPtcls();
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold 30px monospace';ctx.fillStyle='#ffd700';ctx.shadowBlur=22;ctx.shadowColor='#ffd700';ctx.fillText('GANASTE!',W/2,H*.26);ctx.shadowBlur=0;
  ctx.font='14px monospace';ctx.fillStyle='rgba(255,255,255,.8)';ctx.fillText('40 mundos conquistados!',W/2,H*.35);
  ctx.fillText('Sets: '+p1.sets+' - '+p2.sets,W/2,H*.42);
  ctx.globalAlpha=.5+.5*Math.sin(fr*.06);ctx.font='bold 14px monospace';ctx.fillStyle='#fff';ctx.fillText('TAP PARA VOLVER',W/2,H*.72);ctx.globalAlpha=1;ctx.textBaseline='alphabetic';
}

// INPUT
function inPauseBtn(x,y){return x>W-52&&y<44;}

function tap(x,y){
  if(state===S.ERR){wIdx=0;scoreLocked=false;state=S.MENU;return;}
  if(state===S.PAUSE){state=pausedState;return;}
  if(state===S.MENU){state=S.MODE;return;}
  if(state===S.MODE){
    const dw=(W-16)/4,dy=H*.64,dh=H*.12;
    if(y>dy&&y<dy+dh){const di=Math.floor((x-8)/dw);if(di>=0&&di<4){diffIdx=di;return;}}
    startGame(x<W/2?'1p':'2p');return;
  }
  if(state===S.WWIN){nextWorld();return;}
  if(state===S.LOSE||state===S.VICTORY){wIdx=0;p1.sets=0;p2.sets=0;state=S.MENU;}
}

function nextWorld(){
  wIdx++;
  if(wIdx>=WORLDS.length){spawnBurst();state=S.VICTORY;}
  else{p1.score=0;p2.score=0;p1.w=p2.w=padW();p1.x=p2.x=W/2;initBg();resetBall(1);state=S.PLAY;}
}

function startGame(m){
  mode=m;wIdx=0;p1.score=0;p2.score=0;p1.sets=0;p2.sets=0;scoreLocked=false;
  initPos();initBg();resetBall(1);state=S.PLAY;
}

// TOUCH — drag LEFT/RIGHT to move paddle
const AT={};
cv.addEventListener('touchstart',e=>{
  e.preventDefault();initAC();lastTouch=Date.now();
  const rc=cv.getBoundingClientRect();
  for(const t of e.changedTouches){
    const tx=(t.clientX-rc.left)*(W/rc.width);
    const ty=(t.clientY-rc.top)*(H/rc.height);
    if(state===S.PLAY||state===S.POINT){
      if(inPauseBtn(tx,ty)){pausedState=state;state=S.PAUSE;return;}
      // 2P: top half = P2, bottom half = P1
      AT[t.identifier]=(mode==='2p'&&ty<H/2)?'p2':'p1';
    } else {tap(tx,ty);return;}
  }
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  const rc=cv.getBoundingClientRect();
  for(const t of e.changedTouches){
    const who=AT[t.identifier];if(!who)continue;
    const tx=(t.clientX-rc.left)*(W/rc.width);
    const pad=who==='p1'?p1:p2;
    pad.x=Math.max(pad.w/2,Math.min(W-pad.w/2,tx));
  }
},{passive:false});

cv.addEventListener('touchend',e=>{for(const t of e.changedTouches)delete AT[t.identifier];},{passive:false});

// MOUSE — moves P1 left/right
cv.addEventListener('mousemove',e=>{
  if(state!==S.PLAY&&state!==S.POINT)return;
  const rc=cv.getBoundingClientRect();
  p1.x=Math.max(p1.w/2,Math.min(W-p1.w/2,(e.clientX-rc.left)*(W/rc.width)));
});
cv.addEventListener('mousedown',e=>{
  if(Date.now()-lastTouch<500)return;
  initAC();
  const rc=cv.getBoundingClientRect();
  const tx=(e.clientX-rc.left)*(W/rc.width),ty=(e.clientY-rc.top)*(H/rc.height);
  if((state===S.PLAY||state===S.POINT)&&inPauseBtn(tx,ty)){pausedState=state;state=S.PAUSE;return;}
  tap(tx,ty);
});

// LOOP
function loop(){
  try{
    fr++;ctx.clearRect(0,0,W,H);
    if(state===S.ERR){
      ctx.fillStyle='#010118';ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#ff6666';ctx.font='bold 12px monospace';ctx.fillText(String(lastErr).slice(0,55),W/2,H*.42);
      ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.fillText('TAP PARA REINICIAR',W/2,H*.58);
      ctx.textBaseline='alphabetic';
    }
    else if(state===S.MENU){drawMenu();}
    else if(state===S.MODE){drawModeSelect();}
    else if(state===S.PAUSE){drawPauseScreen();}
    else if(state===S.PLAY||state===S.POINT){
      updBg();
      if(state===S.PLAY){updateBall();updateAI();}
      else if(state===S.POINT){ptDelay--;if(ptDelay<=0){resetBall(ptDir);state=S.PLAY;}}
      updPtcls();
      drawBg();drawPtcls();drawObj(ball.x,ball.y,ball.ang);
      drawPad(p1,WORLDS[wIdx].c1);drawPad(p2,WORLDS[wIdx].c2);
      drawHUD();drawPauseBtn();
      if(state===S.POINT){
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.globalAlpha=.5+.5*Math.abs(Math.sin(fr*.15));
        ctx.font='bold 30px monospace';ctx.shadowBlur=12;ctx.shadowColor='#ffd700';
        ctx.fillStyle='#ffd700';ctx.fillText('POINT!',W/2,H/2-30);
        ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.textBaseline='alphabetic';
      }
    }
    else if(state===S.WWIN){drawWin();updPtcls();}
    else if(state===S.LOSE){drawLose();}
    else if(state===S.VICTORY){drawVictory();updPtcls();}
  }catch(e){
    console.error('TT:',e);lastErr=e.message||String(e);state=S.ERR;
  }
  requestAnimationFrame(loop);
}

function makeIcon(){
  const ic=document.createElement('canvas');ic.width=ic.height=180;
  const cx=ic.getContext('2d');
  // background
  const g=cx.createLinearGradient(0,0,0,180);g.addColorStop(0,'#010118');g.addColorStop(1,'#040530');
  cx.fillStyle=g;cx.fillRect(0,0,180,180);
  // stars
  for(let i=0;i<40;i++){cx.fillStyle='rgba(255,255,255,'+(.15+Math.random()*.7)+')';cx.beginPath();cx.arc(Math.random()*180,Math.random()*100,.5+Math.random()*1.5,0,6.28);cx.fill();}
  // world name arc (court lines faint)
  cx.strokeStyle='rgba(255,255,255,.08)';cx.lineWidth=1;cx.beginPath();cx.arc(90,180,70,Math.PI,0);cx.stroke();
  // paddle glow
  cx.shadowBlur=18;cx.shadowColor='#ffff00';
  cx.fillStyle='#ffff00';cx.fillRect(42,138,96,12);
  cx.shadowBlur=0;
  cx.fillStyle='rgba(255,255,255,.2)';cx.fillRect(46,140,88,4);
  // ball
  cx.shadowBlur=22;cx.shadowColor='#ccff00';
  cx.fillStyle='#ccff00';cx.beginPath();cx.arc(90,82,22,0,6.28);cx.fill();
  cx.shadowBlur=0;
  // seams
  cx.strokeStyle='rgba(255,255,255,.65)';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(68,82);cx.bezierCurveTo(79,65,101,65,112,82);cx.stroke();
  cx.beginPath();cx.moveTo(68,82);cx.bezierCurveTo(79,99,101,99,112,82);cx.stroke();
  // highlight
  cx.fillStyle='rgba(255,255,255,.35)';cx.beginPath();cx.arc(82,73,8,0,6.28);cx.fill();
  // "TT" text
  cx.textAlign='center';cx.textBaseline='middle';cx.font='bold 11px monospace';
  cx.fillStyle='rgba(255,255,255,.3)';cx.fillText('TENNIS THINGS',90,164);
  // set as icon
  const url=ic.toDataURL('image/png');
  ['apple-touch-icon','icon'].forEach(rel=>{const l=document.createElement('link');l.rel=rel;if(rel==='icon')l.type='image/png';l.href=url;document.head.appendChild(l);});
  // manifest for Android
  const manifest={name:'Tennis Things',short_name:'TennisTh',start_url:'.',display:'fullscreen',background_color:'#010118',theme_color:'#010118',orientation:'portrait',icons:[{src:url,sizes:'180x180',type:'image/png'}]};
  const ml=document.createElement('link');ml.rel='manifest';ml.href='data:application/json,'+encodeURIComponent(JSON.stringify(manifest));document.head.appendChild(ml);
}

initPos();initBg();loop();makeIcon();
</script>
